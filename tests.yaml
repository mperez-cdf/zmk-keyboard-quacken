      -DDTS_EXTRA_CPPFLAGS="-DCI_IGNORE_USER_SETTINGS;-DKB_LAYOUT_ERGOL;-DHUMMINGBIRD"

  # Dvorak emulation on Qwerty
  - board: sparkfun_pro_micro_rp2040//zmk
    shield: tester_pro_micro
    artifact-name: qwerty_to_dvorak
    cmake-args: >
